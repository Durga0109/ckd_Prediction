apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ckd-prediction-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
  - host: ckd-prediction.example.com  # Replace with your actual domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ckd-prediction-service
            port:
              number: 80
